name = "elixpo-search"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# D1 Database — persistent storage for sessions, messages, bookmarks, discover articles
# Create with: wrangler d1 create elixpo-search-db
# Then paste the database_id below
[[d1_databases]]
binding = "DB"
database_name = "elixpo-search-db"
database_id = "" # fill after `wrangler d1 create elixpo-search-db`

# KV Namespace — read cache for session/conversation data
# Create with: wrangler kv namespace create SESSIONS_KV
# Then paste the id below
[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "" # fill after `wrangler kv namespace create SESSIONS_KV`

# KV Namespace — guest rate limiting (IP -> request count)
# Create with: wrangler kv namespace create RATE_LIMIT_KV
# Then paste the id below
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "" # fill after `wrangler kv namespace create RATE_LIMIT_KV`

[vars]
BACKEND_URL = "https://search.elixpo.com:10001"
GUEST_REQUEST_LIMIT = "15"

# Secrets (set via `wrangler secret put <NAME>`):
# - INTERNAL_API_KEY  — passed as X-Internal-Key to backend
# - XID               — anti-abuse token for API route validation
# - API_KEY           — nginx API key for backend requests
